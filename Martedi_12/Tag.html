<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esempio semantico</title>
</head>
<body>

    <!-- L'header definisce la testata del sito, solitamente contiene il logo o il titolo -->
    <header>
        <h1>Sito di esempio</h1>
    </header>

    <!-- Il tag nav racchiude i link principali per la navigazione del sito -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Contatti</a>
    </nav>

    <!-- Main indica il contenuto principale e unico della pagina -->
    <main>
        
        <!-- Section definisce una sezione generica di contenuto correlato -->
        <section>
            <h2>Sezione principale</h2>
            <p>Contenuto della sezione.</p>
        </section>

        <!-- Article rappresenta un contenuto indipendente e riutilizzabile (es. un post) -->
        <article>
            <h2>Articolo</h2>
            <p>Testo di un contenuto indipendente.</p>
        </article>

    </main>

    <!-- Footer definisce la chiusura della pagina, con copyright o contatti -->
    <footer>
        <p>Copyright 2026</p>
    </footer>

</body>
</html>
