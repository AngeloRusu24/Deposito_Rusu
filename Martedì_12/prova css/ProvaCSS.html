<!-- L'attributo style permette di definire proprietà CSS direttamente sul tag -->
<p style="color: red; font-size: 18px;">
  Questo è un paragrafo con stile inline
</p>

<!-- Il tag <link> nella <head> collega il file HTML al foglio di stile esterno -->
<head>
  <link rel="stylesheet" href="ProvaCss.css">
</head>

<body>
  <!-- Questo paragrafo non ha stili scritti qui, ma li "pesca" dal file esterno -->
  <p>Paragrafo con stile esterno</p>

  <p class="evidenziato"> Testo </p>

</body>
