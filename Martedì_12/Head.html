<head>
  <!-- Definisce la codifica dei caratteri (UTF-8 supporta quasi tutti i simboli e lingue) -->
  <meta charset="UTF-8">

  <!-- Fornisce una descrizione del sito che apparirà nei risultati dei motori di ricerca -->
  <meta name="description" content="Esempio di pagina HTML">

  <!-- Specifica il nome di chi ha creato o gestisce il documento -->
  <meta name="author" content="Nome Autore">

  <!-- Essenziale per il responsive design: adatta il sito alla larghezza dello schermo dello smartphone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Il titolo della pagina che appare sulla scheda del browser -->
  <title>Pagina con meta tag</title>
</head>
