<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiori & Petali</title>
  <!-- Collegamento al CSS esterno -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGAZIONE -->
  <header>
    <span class="logo"> Fiori & Petali</span>
    <nav>
      <a href="#prodotti">Fiori</a>
      <a href="#contatti">Contatti</a>
    </nav>
  </header>

  <!-- HERO: sezione di benvenuto -->
  <section class="hero">
    <h1>Fiori per ogni momento</h1>
    <p>Composizioni fresche, consegna a domicilio.</p>
    <a href="#contatti" class="btn">Contattaci</a>
  </section>

  <!-- PRODOTTI: griglia di card -->
  <section id="prodotti">
    <h2>I nostri fiori</h2>
    <div class="griglia">

      <div class="card">
        <h3>Rose</h3>
        <p>da €12,00</p>
      </div>

      <div class="card">
        <h3>Tulipani</h3>
        <p>da €8,00</p>
      </div>

      <div class="card">
        <h3>Girasoli</h3>
        <p>da €6,00</p>
      </div>

    </div>
  </section>

  <!-- FORM CONTATTI: obbligatorio secondo consegna -->
  <section id="contatti">
    <h2>Contattaci</h2>

    <!-- action="#" = nessun server, rimane sulla stessa pagina -->
    <form action="#" method="post">

      <!-- label for="x" deve corrispondere a id="x" dell'input -->
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Il tuo nome" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="La tua email" required />

      <label for="messaggio">Messaggio</label>
      <textarea id="messaggio" name="messaggio" rows="4" placeholder="Scrivi qui..." required></textarea>

      <!-- type="submit" invia il form -->
      <button type="submit" class="btn">Invia</button>

    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 Fiori & Petali &ndash; Via dei Fiori 12, Prato</p>
  </footer>

</body>
</html>
