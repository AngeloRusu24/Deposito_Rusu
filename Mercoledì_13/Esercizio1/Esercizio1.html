<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esercitazione CSS</title>
    <!-- Collegamento a un file CSS esterno -->
    <link rel="stylesheet" href="Esercitazione1.css">
</head>
<body>

    <!-- Contenitore <div> con classe per il Box Model -->
    <div class="box-container">
        <!-- Titolo <h1> con ID per verificare la specificità -->
        <h1 id="titolo-principale" class="testo-comune">Il mio progetto CSS</h1>
        
        <!-- Paragrafo <p> con classe per lo stile e tipografia -->
        <p class="descrizione">
            Questo paragrafo serve per testare i colori, la tipografia 
            e l'ereditarietà degli stili.
        </p>

        <!-- Elemento interattivo per testare la pseudo-classe :hover -->
        <a href="#" class="pulsante">Passa il mouse qui</a>
    </div>

</body>
</html>
